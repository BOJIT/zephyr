include: [ethernet-controller.yaml, pinctrl-device.yaml]

properties:
  interrupts:
    required: true
  clocks:
    required: true
  clock-names:
    required: true
  pinctrl-0:
    required: true
  pinctrl-names:
    required: true
  phy-connection-type:
    required: true
    description: |
      PHY connection to MAC
    enum:
      - internal
      - mdio
  phy-handle:
    required: true
